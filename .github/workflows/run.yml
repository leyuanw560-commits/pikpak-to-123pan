name: 🚀 专属行动：批量洗名字 (自动修复版)

on:
  workflow_dispatch:

jobs:
  rename_job:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 环境初始化 (安装 Rclone)
        run: |
          sudo -v ; curl https://rclone.org/install.sh | sudo bash

      - name: 2. 注入保险柜凭证 (智能诊断)
        run: |
          mkdir -p ~/.config/rclone
          # 💡 这里我同时尝试读取两个常见的密钥名字，防止你起错名
          CONF_DATA="${{ secrets.RCLONE_CONF }}${{ secrets.RCLONE_CONFIG }}"
          if [ -z "$CONF_DATA" ]; then
            echo "❌ 警告：没读到任何密钥数据！请检查 GitHub Secrets 里名字是否为 RCLONE_CONF"
            exit 1
          fi
          echo "$CONF_DATA" > ~/.config/rclone/rclone.conf
          echo "✅ 配置注入成功！目前认识的网盘有："
          rclone listremotes

      - name: 3. 终极批量洗名字 (演习模式)
        shell: python
        run: |
          import subprocess
          import json
          import os

          # 🔍 第一步：自动寻找 PikPak 的真实名字
          print("🕵️ 正在匹配你的网盘名称...")
          remote_list = subprocess.run(['rclone', 'listremotes'], capture_output=True, text=True).stdout
          remotes = [r.strip(':') for r in remote_list.split()]
          
          # 寻找名字里包含 pikpak 的那个（不区分大小写）
          real_remote = next((r for r in remotes if r.lower() == 'pikpak'), None)
          
          if not real_remote:
              print(f"❌ 报错：在你的配置里没找到任何叫 PikPak 的网盘！当前已有：{remotes}")
              exit(1)
          
          print(f"✅ 找到目标网盘：[{real_remote}]")
          TARGET_DIR = f"{real_remote}:/#AndMlove"
          
          # 🛡️ 演习模式开关
          DO_RENAME = False

          print(f"🔍 正在扫描 [{TARGET_DIR}]...")
          cmd = ['rclone', 'lsjson', '-R', TARGET_DIR]
          result = subprocess.run(cmd, capture_output=True, text=True)
          
          if result.returncode != 0:
              print("❌ 读取路径失败，请确认 #AndMlove 文件夹是否存在。")
              exit(1)

          files = json.loads(result.stdout)
          counter = 1
          print("\n--- 📋 预计改名清单 ---")
          for f in files:
              if not f['IsDir']:  
                  relative_path = f['Path'] 
                  dir_name = os.path.dirname(relative_path)
                  ext = os.path.splitext(relative_path)[1] 
                  new_name = f"{counter}{ext}"
                  new_relative_path = f"{dir_name}/{new_name}" if dir_name else new_name
                  old_full_path = f"{TARGET_DIR}/{relative_path}"
                  new_full_path = f"{TARGET_DIR}/{new_relative_path}"
                  print(f"📝 {relative_path}  -->  {new_relative_path}")
                  if DO_RENAME:
                      subprocess.run(['rclone', 'moveto', old_full_path, new_full_path])
                  counter += 1

          print("------------------------")
          if not DO_RENAME:
              print(f"\n✅ 演习完毕！找到 {counter - 1} 个文件。")
          else:
              print(f"\n🎉 搞定！")
