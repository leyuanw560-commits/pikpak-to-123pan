name: 10TB Extreme Transfer

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # 终极保底：每 6 小时自动唤醒一次

# 原生防并发机制：如果有任务在跑，新任务自动排队，绝不互相踩踏
concurrency:
  group: rclone-transfer-queue
  cancel-in-progress: false

# 必须开启最高读写权限，否则无法自动触发接力
permissions:
  actions: write
  contents: write

jobs:
  Extreme-Transfer:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # GitHub 官方硬性限制 6 小时

    steps:
      - name: 1. 闪电安装 Rclone
        run: curl -s https://rclone.org/install.sh | sudo bash > /dev/null 2>&1

      - name: 2. 注入云盘凭证 (提取 Secrets)
        run: |
          mkdir -p ~/.config/rclone
          rclone config create pikpak pikpak user "${{ secrets.PIKPAK_USER }}" pass "${{ secrets.PIKPAK_PASS }}" > /dev/null 2>&1
          rclone config create 123pan webdav url "https://webdav.123pan.cn/webdav" vendor "other" user "${{ secrets.PAN123_USER }}" pass "${{ secrets.PAN123_PASS }}" headers "User-Agent,Mozilla/5.0" > /dev/null 2>&1

      - name: 3. 极限榨干内存传输 (防拉闸版)
        id: sync
        continue-on-error: true
        run: |
          # 核心压榨参数：8并发 x 512M缓存 = 4GB 内存池抗断流。
          # 345分钟后主动优雅停止，避免被 GitHub 强杀导致坏档。
          rclone copy pikpak:/ 123pan:/PikPak全量备份 \
            --size-only \
            --transfers 8 \
            --checkers 32 \
            --tpslimit 12 \
            --buffer-size 512M \
            --use-mmap \
            --max-duration 345m \
            --retries 999 \
            --low-level-retries 20 \
            --timeout 20m \
            --contimeout 2m \
            --stats 30s \
            --log-level INFO \
            --log-file sync.log
          
          # 捕获 Rclone 的真实退出状态码
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: 4. 终极无限接力 (自动复活唤醒)
        # Rclone 退出码 8 代表 max-duration 时间到了，143 代表被系统强杀
        if: steps.sync.outputs.exit_code == '8' || steps.sync.outputs.exit_code == '143'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "⏳ 达到安全运行时长极限 (5小时45分)，正在自动召唤下一波接力..."
          gh workflow run "${{ github.workflow }}" || echo "❌ 触发接力失败，请检查仓库 Settings 的读写权限！"

      - name: 5. 战况日志存档 (保留 3 天)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Transfer-Logs-${{ github.run_number }}-${{ github.run_attempt }}
          path: sync.log
          retention-days: 3
