name: 🚀 专属行动：批量洗名字

on:
  workflow_dispatch: # 只允许手动点击运行

jobs:
  rename_job:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 环境初始化 (安装 Rclone)
        run: |
          sudo -v ; curl https://rclone.org/install.sh | sudo bash

      - name: 2. 注入保险柜凭证 (读取配置)
        run: |
          mkdir -p ~/.config/rclone
          # 默认读取你仓库里存好的 RCLONE_CONF 密钥
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: 3. 终极批量洗名字 (演习模式)
        shell: python
        run: |
          import subprocess
          import json
          import os

          # 🎯 目标文件夹已经锁定
          TARGET_DIR = "pikpak:/#AndMlove"
          
          # 🛡️ 安全开关：False为演习预览，True为正式动刀
          DO_RENAME = False

          print(f"🔍 正在深度穿透扫描 [{TARGET_DIR}] 及其所有子文件夹...")
          cmd = ['rclone', 'lsjson', '-R', TARGET_DIR]
          result = subprocess.run(cmd, capture_output=True, text=True)

          if result.returncode != 0:
              print("❌ 读取失败，请检查路径是否拼写正确。")
              print(result.stderr)
              exit(1)

          files = json.loads(result.stdout)
          counter = 1

          print("\n--- 📋 预计改名清单 ---")
          for f in files:
              if not f['IsDir']:  
                  relative_path = f['Path'] 
                  dir_name = os.path.dirname(relative_path)
                  ext = os.path.splitext(relative_path)[1] 
                  
                  new_name = f"{counter}{ext}"
                  
                  if dir_name:
                      new_relative_path = f"{dir_name}/{new_name}"
                  else:
                      new_relative_path = new_name
                      
                  old_full_path = f"{TARGET_DIR}/{relative_path}"
                  new_full_path = f"{TARGET_DIR}/{new_relative_path}"
                  
                  print(f"📝 {relative_path}  -->  {new_relative_path}")
                  
                  if DO_RENAME:
                      subprocess.run(['rclone', 'moveto', old_full_path, new_full_path])
                      
                  counter += 1

          print("------------------------")
          if not DO_RENAME:
              print(f"\n✅ 演习扫描完毕！预计将把 {counter - 1} 个文件打上数字编号。")
          else:
              print(f"\n🎉 搞定！改名完成。")
